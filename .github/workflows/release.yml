name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to attach artifacts to, for example v0.0.1-beta.1"
        required: true
        type: string

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: build ${{ matrix.asset }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            asset: opencli-x86_64-unknown-linux-gnu
            target: x86_64-unknown-linux-gnu
            exe: ""
            archive: opencli-x86_64-unknown-linux-gnu.tar.gz
          - os: macos-latest
            asset: opencli-x86_64-apple-darwin
            target: x86_64-apple-darwin
            exe: ""
            archive: opencli-x86_64-apple-darwin.tar.gz
          - os: macos-latest
            asset: opencli-aarch64-apple-darwin
            target: aarch64-apple-darwin
            exe: ""
            archive: opencli-aarch64-apple-darwin.tar.gz
          - os: windows-latest
            asset: opencli-x86_64-pc-windows-msvc
            target: x86_64-pc-windows-msvc
            exe: ".exe"
            archive: opencli-x86_64-pc-windows-msvc.zip

    steps:
      - uses: actions/checkout@v6.0.2
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.asset }}
      - run: rustup target add ${{ matrix.target }}
      - run: cargo build --release --bin opencli --target ${{ matrix.target }}
      - name: Package archive (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "dist/${{ matrix.asset }}"
          cp "target/${{ matrix.target }}/release/opencli${{ matrix.exe }}" "dist/${{ matrix.asset }}/"
          cp README.md CHANGELOG.md LICENSE "dist/${{ matrix.asset }}/"
          cd dist
          tar -czf "${{ matrix.archive }}" "${{ matrix.asset }}"
      - name: Package archive (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "dist/${{ matrix.asset }}" | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/opencli${{ matrix.exe }}" "dist/${{ matrix.asset }}/"
          Copy-Item README.md, CHANGELOG.md, LICENSE "dist/${{ matrix.asset }}/"
          Compress-Archive -Path "dist/${{ matrix.asset }}" -DestinationPath "dist/${{ matrix.archive }}" -Force
      - uses: actions/upload-artifact@v7.0.1
        with:
          name: ${{ matrix.archive }}
          path: dist/${{ matrix.archive }}
          if-no-files-found: error

  publish:
    name: publish GitHub release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8.0.1
        with:
          path: dist
          merge-multiple: true
      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          prerelease: true
          generate_release_notes: true
          files: dist/*
